<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anderson Moncada | Hoja de Vida</title>
    <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>

    <div id="ai-boot-screen">
        
        <canvas id="neural-canvas"></canvas>

        <div class="ai-container" id="auth-card">
            <div class="ai-header">
                <h2>ANDERSON MONCADA</h2>
                <p>Manten pulsado para autorizar y sincronizar el perfil profesional.</p>
            </div>

            <div class="ai-core-wrapper">
                <svg class="progress-ring" width="180" height="180">
                    <circle class="progress-ring__bg" stroke="#1e293b" stroke-width="6" fill="transparent" r="84" cx="90" cy="90"/>
                    <circle class="progress-ring__circle" stroke="#38bdf8" stroke-width="6" fill="transparent" r="84" cx="90" cy="90"/>
                </svg>
                
                <button id="auth-btn" class="auth-button">
                    <span class="auth-text">MANTENER<br>PULSADO</span>
                    <div class="ai-orb"></div>
                </button>
            </div>

            <div class="ai-status">
                <p id="ai-status-text" class="typing-text">Sistema en espera.</p>
            </div>
        </div>
    </div>

    <div id="main-portfolio" class="main-content">
        <div class="container">
            <header>
                <h1 id="web-nombre">Anderson Mauricio Moncada Valbuena</h1>
                <h2 id="web-titulo">Ingeniero de Sistemas | Kotlin, Python, Docker Expert</h2>
                <p id="web-resumen" class="resumen"></p>
            </header>

            <div class="grid">
                <div class="card">
                    <h3 class="card-title">💻 Ingeniería de Desarrollo</h3>
                    <div id="skills-desarrollo"></div>
                </div>
                <div class="card">
                    <h3 class="card-title">🛡️ Infraestructura & Ciberseguridad</h3>
                    <div id="skills-infra"></div>
                </div>
            </div>

            <section>
                <h2 class="section-title">Experiencia Técnica y Proyectos</h2>
                <div id="experience-container" class="card"></div>
            </section>

            <section class="download-section">
                <button id="downloadBtn" class="btn-download">
                    📥 Generar y Descargar PDF Oficial
                </button>
            </section>
        </div>
    </div>

    <script src="js/main.js?v=3"></script>
</body>
</html>
