<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anderson Moncada | Portfolio</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #e2e8f0;
            --accent-color: #38bdf8;
            --card-bg: #1e293b;
            --terminal-green: #22c55e;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* =========================================
           MINIJUEGO: HACKER TYPER (CARGA)
           ========================================= */
        #hacker-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000;
            color: var(--terminal-green);
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            box-sizing: border-box;
            z-index: 9999;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        #hacker-instructions {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 0 10px var(--terminal-green);
            animation: pulse 2s infinite;
        }

        #hacker-code {
            flex-grow: 1;
            overflow-y: hidden;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 0.9rem;
            text-shadow: 0 0 5px var(--terminal-green);
        }

        #access-granted {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.9);
            border: 3px solid var(--terminal-green);
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 30px var(--terminal-green);
            z-index: 10000;
        }

        .btn-enter {
            background-color: var(--terminal-green);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            animation: blinker 1.5s linear infinite;
        }
        .btn-enter:hover { background-color: #fff; }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        @keyframes blinker { 50% { opacity: 0.7; } }
        .fade-out { animation: fadeOut 1s forwards; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* =========================================
           PORTAFOLIO PRINCIPAL (OCULTO INICIALMENTE)
           ========================================= */
        #main-portfolio {
            padding: 40px 20px;
            display: none;
        }
        .container { max-width: 900px; margin: 0 auto; animation: fadeIn 1s ease-out; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 2.3rem; color: var(--accent-color); margin-bottom: 5px; }
        h2 { font-size: 1.2rem; color: #94a3b8; font-weight: normal; }
        p.resumen { color: #cbd5e1; margin-top: 20px; text-align: justify; }
        .section-title { font-size: 1.6rem; margin: 40px 0 20px 0; border-left: 4px solid var(--accent-color); padding-left: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background-color: var(--card-bg); padding: 20px; border-radius: 12px; }
        .skill-container { margin-bottom: 15px; }
        .skill-name { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; font-size: 0.95rem; }
        .progress-bar { background-color: #334155; height: 10px; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #0ea5e9, #38bdf8); width: 0; }
        .timeline-item { margin-bottom: 25px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        .timeline-header { display: flex; justify-content: space-between; color: var(--accent-color); font-weight: bold; }
        .timeline-company { font-style: italic; color: #94a3b8; font-size: 0.9rem; margin-bottom: 8px; }
        .timeline-item ul { padding-left: 20px; margin: 5px 0; }
        .btn {
            background-color: var(--accent-color); color: #0f172a; border: none;
            padding: 15px 30px; font-size: 1.1rem; font-weight: bold; border-radius: 8px;
            cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center;
        }
        .btn:hover { background-color: #7dd3fc; transform: scale(1.03); }
        .btn:disabled { background-color: #475569; cursor: not-allowed; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="hacker-screen">
        <div id="hacker-instructions">SERVIDOR EN REPOSO. TECLEA CUALQUIER COSA PARA INICIAR SECUENCIA...</div>
        <div id="hacker-code"></div>
        
        <div id="access-granted">
            <h2 style="color: var(--terminal-green); margin: 0; font-size: 2rem;">[ ACCESO CONCEDIDO ]</h2>
            <p style="color: #fff; margin-top: 10px;">Backend Sincronizado. Render API Online.</p>
            <button class="btn-enter" onclick="enterSystem()">Ingresar al Perfil</button>
        </div>
    </div>

    <div id="main-portfolio">
        <div class="container">
            <header>
                <h1 id="web-nombre">Cargando perfil...</h1>
                <h2 id="web-titulo">...</h2>
                <p id="web-resumen" class="resumen"></p>
            </header>

            <section>
                <h3 class="section-title">Habilidades Especializadas</h3>
                <div class="grid">
                    <div class="card">
                        <h4 style="color: var(--accent-color); margin-bottom: 15px;">💻 Desarrollo</h4>
                        <div id="skills-desarrollo"></div>
                    </div>
                    <div class="card">
                        <h4 style="color: var(--accent-color); margin-bottom: 15px;">🛡️ Infraestructura & Seguridad</h4>
                        <div id="skills-infra"></div>
                    </div>
                </div>
            </section>

            <section>
                <h3 class="section-title">Trayectoria Profesional</h3>
                <div id="experience-container" class="card"></div>
            </section>

            <section style="text-align: center; margin-top: 50px; padding-bottom: 50px;">
                <button id="downloadBtn" class="btn" onclick="descargarCV()">
                    📥 Generar y Descargar PDF
                </button>
                <p id="statusMsg" style="margin-top: 10px; font-size: 0.9rem; color: #4ade80;">API Conectada. Generación lista.</p>
            </section>
        </div>
    </div>

    <script>
        const BASE_URL = "https://anderson-cv-api.onrender.com";
        let apiIsReady = false; // Bandera para saber si Python ya despertó

        // --- LÓGICA DEL MINIJUEGO "HACKER TYPER" ---
        const codeText = `
def initialize_docker_engine(port=8080):
    print("Mounting volumes for GLPI and Vaultwarden...")
    sys.stdout.flush()
    while not connected():
        attempt_reconnect(timeout=5)
    return "[OK] Containers orchestrated."

class KotlinMicroservice(MVVMArchitecture):
    def __init__(self):
        super().inject_dependencies(Retrofit2, RoomDB)
        self.security = ISO27001ComplianceLayer()

    async def fetch_data(self):
        token = await self.security.generate_bearer_token()
        return firebase_admin.firestore.client().collection('users').get()

def bypass_firewall_rules(target_ip):
    # Simulated SOC Analyst Override
    for attempt in range(0, 1000):
        hash_check = hashlib.sha256(f"secret_{attempt}".encode()).hexdigest()
        if hash_check.startswith("0000"):
            return True
    return False

# INITIALIZING SYSTEM...
# DECRYPTING PAYLOAD...
# LOADING ANDERSON.M.M.V PROFILE...
`;
        let codeIndex = 0;
        const codeContainer = document.getElementById('hacker-code');
        const instructions = document.getElementById('hacker-instructions');

        // Escucha CUALQUIER tecla presionada por el usuario
        window.addEventListener('keydown', (e) => {
            // Si la API ya cargó y está mostrando el botón de acceso, ignoramos el tecleo
            if (document.getElementById('access-granted').style.display === 'block') return;

            instructions.style.display = 'none'; // Oculta las instrucciones
            
            // Agrega 5 caracteres por cada tecla presionada para dar el efecto de "escribir rápido"
            let charsToAdd = 5;
            for (let i = 0; i < charsToAdd; i++) {
                if (codeIndex < codeText.length) {
                    codeContainer.textContent += codeText.charAt(codeIndex);
                    codeIndex++;
                } else {
                    // Si se acaba el texto, reinicia para que puedan seguir "hackeando"
                    codeIndex = 0; 
                }
            }
            // Auto-scroll al final
            codeContainer.scrollTop = codeContainer.scrollHeight;
        });

        // --- LÓGICA DE SINCRONIZACIÓN CON PYTHON ---
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                // Hacemos el fetch real en el fondo mientras el usuario juega
                const response = await fetch(`${BASE_URL}/api/cv-data`);
                if(!response.ok) throw new Error();
                const data = await response.json();

                // Llenamos el DOM
                document.getElementById('web-nombre').innerText = data.info_personal.nombre;
                document.getElementById('web-titulo').innerText = data.info_personal.perfil_corto;
                document.getElementById('web-resumen').innerText = data.info_personal.resumen;

                data.skills.forEach(skill => {
                    document.getElementById(`skills-${skill.category}`).innerHTML += `
                        <div class="skill-container">
                            <div class="skill-name"><span>${skill.name}</span><span>${skill.percentage}%</span></div>
                            <div class="progress-bar"><div class="progress-fill" style="width: ${skill.percentage}%;"></div></div>
                        </div>`;
                });

                data.experiencia.forEach(exp => {
                    let detallesHtml = exp.detalles.map(d => `<li>${d}</li>`).join('');
                    document.getElementById('experience-container').innerHTML += `
                        <div class="timeline-item">
                            <div class="timeline-header"><span>${exp.cargo}</span><span>${exp.fechas}</span></div>
                            <div class="timeline-company">${exp.empresa}</div>
                            <ul>${detallesHtml}</ul>
                        </div>`;
                });

                // --- ¡ÉXITO! PYTHON RESPONDIÓ ---
                apiIsReady = true;
                
                // Le damos al menos 3 segundos de juego al usuario para que disfrute el efecto
                // Incluso si la API responde inmediatamente.
                setTimeout(() => {
                    document.getElementById('access-granted').style.display = 'block';
                }, 3000);

            } catch (error) {
                // Reintento en caso de falla de conexión
                setTimeout(() => { window.location.reload(); }, 5000);
            }
        });

        // --- TRANSICIÓN AL PORTAFOLIO ---
        function enterSystem() {
            const hackerScreen = document.getElementById('hacker-screen');
            const mainContent = document.getElementById('main-portfolio');
            
            hackerScreen.classList.add('fade-out');
            
            setTimeout(() => {
                hackerScreen.style.display = 'none';
                mainContent.style.display = 'block';
                // Activamos animaciones CSS
                document.querySelectorAll('.progress-fill').forEach(bar => {
                    bar.style.animation = "fillBars 2s cubic-bezier(0.1, 1, 0.1, 1) forwards";
                });
            }, 1000);
        }

        // --- DESCARGA DE PDF ---
        async function descargarCV() {
            const btn = document.getElementById('downloadBtn');
            const msg = document.getElementById('statusMsg');
            btn.disabled = true;
            btn.innerHTML = '⏳ Generando PDF en Python...';
            msg.innerText = "Compilando documento...";

            try {
                const response = await fetch(`${BASE_URL}/descargar-cv`);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'CV_Anderson_Moncada.pdf';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                msg.innerText = "¡Hoja de Vida descargada con éxito! ✅";
            } catch (error) {
                msg.innerText = "Error al descargar el documento. Intenta de nuevo.";
                msg.style.color = "#f87171";
            } finally {
                btn.disabled = false;
                btn.innerHTML = '📥 Generar y Descargar PDF';
            }
        }
    </script>
</body>
</html>
